<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PHOSL Piano Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>

  <main class="app-shell">
    <section id="loginView" class="card login-card">
      <h1>PHOSL Piano Management</h1>
      <p>Inventory, workers, suppliers, sales and reports in one place.</p>
      <form id="loginForm" class="grid-2">
        <label>
          Login (username or email)
          <input type="text" name="login" required placeholder="admin" />
        </label>
        <label>
          Password
          <input type="password" name="password" required placeholder="admin123" />
        </label>
        <button type="submit" class="btn primary">Sign In</button>
      </form>
      <p id="loginStatus" class="status"></p>
      <small>Default seed login: <code>admin / admin123</code></small>
    </section>

    <section id="appView" class="hidden">
      <header class="topbar card">
        <div>
          <h2>Piano Management System</h2>
          <p id="userInfo">Not logged in</p>
        </div>
        <div class="topbar-actions">
          <span id="activeRole" class="pill"></span>
          <button id="logoutBtn" class="btn">Logout</button>
        </div>
      </header>

      <nav id="mainNav" class="nav-grid"></nav>

      <p id="statusMessage" class="status"></p>

      <section id="dashboard" class="view card"></section>
      <section id="pianos" class="view card hidden"></section>
      <section id="workers" class="view card hidden"></section>
      <section id="suppliers" class="view card hidden"></section>
      <section id="purchases" class="view card hidden"></section>
      <section id="customers" class="view card hidden"></section>
      <section id="sales" class="view card hidden"></section>
      <section id="installments" class="view card hidden"></section>
      <section id="commissions" class="view card hidden"></section>
      <section id="tasks" class="view card hidden"></section>
      <section id="repairs" class="view card hidden"></section>
    </section>
  </main>

  <template id="tableTemplate">
    <div class="table-wrap">
      <table>
        <thead></thead>
        <tbody></tbody>
      </table>
    </div>
  </template>

  <script src="/app.js"></script>
</body>
</html>
