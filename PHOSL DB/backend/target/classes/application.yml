spring:
  datasource:
    url: jdbc:mysql://localhost:3306/piano_management?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

app:
  jwt-secret: "change-this-very-long-jwt-secret-key-change-this"
  jwt-expiration-ms: 86400000
